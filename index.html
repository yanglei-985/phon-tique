<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>法语语音知识查询</title>
<style>
  :root {
    --bg: #f4efe4;
    --bg-soft: #fbf8f1;
    --panel: rgba(255, 252, 245, 0.94);
    --panel-strong: #fffdf8;
    --line: rgba(72, 59, 38, 0.16);
    --line-strong: rgba(72, 59, 38, 0.28);
    --text: #1f1a14;
    --text-muted: #6f675b;
    --text-soft: #938777;
    --accent: #b44f2c;
    --accent-deep: #7f341a;
    --accent-soft: rgba(180, 79, 44, 0.14);
    --green: #2f6a4e;
    --green-soft: rgba(47, 106, 78, 0.12);
    --red: #9a3f3f;
    --red-soft: rgba(154, 63, 63, 0.12);
    --blue: #355f8d;
    --blue-soft: rgba(53, 95, 141, 0.12);
    --shadow: 0 18px 45px rgba(49, 37, 16, 0.08);
    --radius-xl: 28px;
    --radius-lg: 20px;
    --radius-md: 16px;
    --radius-sm: 12px;
    --font-serif: "Palatino Linotype", "Book Antiqua", "Songti SC", "Noto Serif SC", serif;
    --font-sans: "Aptos", "Trebuchet MS", "Segoe UI", sans-serif;
    --font-mono: "Cascadia Mono", "Consolas", "SFMono-Regular", monospace;
  }

  * {
    box-sizing: border-box;
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    margin: 0;
    color: var(--text);
    font-family: var(--font-serif);
    background:
      radial-gradient(circle at top left, rgba(180, 79, 44, 0.12), transparent 26%),
      radial-gradient(circle at top right, rgba(53, 95, 141, 0.08), transparent 28%),
      linear-gradient(180deg, #f8f2e7 0%, #f4efe4 48%, #f8f4eb 100%);
    min-height: 100vh;
  }

  button,
  input,
  select {
    font: inherit;
  }

  .page-shell {
    width: min(1240px, calc(100% - 32px));
    margin: 18px auto 40px;
  }

  .topbar {
    position: sticky;
    top: 16px;
    z-index: 20;
    backdrop-filter: blur(16px);
    background: rgba(251, 248, 241, 0.86);
    border: 1px solid rgba(72, 59, 38, 0.1);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .topbar-main {
    display: grid;
    grid-template-columns: minmax(0, 1.2fr) minmax(280px, 420px);
    gap: 20px;
    padding: 22px 24px 18px;
    align-items: end;
  }

  .brand-kicker {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 6px 12px;
    border-radius: 999px;
    background: var(--accent-soft);
    color: var(--accent-deep);
    font-family: var(--font-sans);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .brand-title {
    margin: 14px 0 8px;
    font-size: clamp(30px, 4vw, 48px);
    line-height: 0.96;
    letter-spacing: -0.03em;
  }

  .brand-subtitle {
    margin: 0;
    color: var(--text-muted);
    font-family: var(--font-sans);
    font-size: 14px;
    line-height: 1.75;
    max-width: 720px;
  }

  .search-panel {
    display: grid;
    gap: 12px;
  }

  .search-box {
    display: flex;
    align-items: center;
    gap: 12px;
    min-height: 56px;
    padding: 0 16px;
    border-radius: 18px;
    background: var(--panel-strong);
    border: 1px solid var(--line);
  }

  .search-box:focus-within {
    border-color: rgba(180, 79, 44, 0.38);
    box-shadow: 0 0 0 4px rgba(180, 79, 44, 0.08);
  }

  .search-icon {
    color: var(--text-soft);
    flex-shrink: 0;
  }

  .search-input {
    width: 100%;
    border: none;
    background: transparent;
    outline: none;
    font-family: var(--font-mono);
    font-size: 15px;
    color: var(--text);
  }

  .search-input::placeholder {
    color: var(--text-soft);
  }

  .search-hint {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    color: var(--text-soft);
    font-family: var(--font-sans);
    font-size: 12px;
  }

  .tabs {
    display: flex;
    gap: 8px;
    padding: 0 16px 16px;
    overflow-x: auto;
    scrollbar-width: none;
  }

  .tabs::-webkit-scrollbar {
    display: none;
  }

  .tab-button {
    border: 1px solid transparent;
    background: transparent;
    color: var(--text-muted);
    border-radius: 999px;
    padding: 10px 16px;
    cursor: pointer;
    font-family: var(--font-sans);
    font-size: 14px;
    white-space: nowrap;
    transition: transform 140ms ease, color 140ms ease, background 140ms ease, border-color 140ms ease;
  }

  .tab-button:hover {
    color: var(--text);
    transform: translateY(-1px);
  }

  .tab-button.is-active {
    background: var(--text);
    color: #f8f3e9;
    border-color: var(--text);
  }

  .content {
    display: grid;
    gap: 18px;
    margin-top: 20px;
  }

  .panel {
    background: var(--panel);
    border: 1px solid rgba(72, 59, 38, 0.1);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .section-head {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    align-items: flex-end;
    padding: 24px 24px 18px;
    border-bottom: 1px solid rgba(72, 59, 38, 0.08);
  }

  .section-kicker {
    display: block;
    margin-bottom: 8px;
    font-family: var(--font-sans);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent-deep);
  }

  .section-title {
    margin: 0;
    font-size: clamp(24px, 3vw, 34px);
    line-height: 1.02;
    letter-spacing: -0.03em;
  }

  .section-copy {
    margin: 8px 0 0;
    max-width: 820px;
    color: var(--text-muted);
    font-family: var(--font-sans);
    font-size: 14px;
    line-height: 1.7;
  }

  .section-meta {
    flex-shrink: 0;
    color: var(--text-soft);
    font-family: var(--font-sans);
    font-size: 13px;
    text-align: right;
  }

  .section-body {
    padding: 24px;
  }

  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(152px, 1fr));
    gap: 14px;
  }

  .phoneme-card {
    border: 1px solid var(--line);
    border-radius: 18px;
    background:
      linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(250, 245, 237, 0.94));
    padding: 18px 16px 16px;
    text-align: left;
    cursor: pointer;
    min-height: 126px;
    transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease, background 160ms ease;
  }

  .phoneme-card:hover {
    transform: translateY(-3px);
    border-color: rgba(180, 79, 44, 0.28);
    box-shadow: 0 14px 28px rgba(49, 37, 16, 0.08);
  }

  .phoneme-card.is-active {
    background:
      linear-gradient(180deg, rgba(180, 79, 44, 0.96), rgba(135, 53, 27, 0.96));
    border-color: transparent;
    color: #fff8f1;
    box-shadow: 0 20px 34px rgba(135, 53, 27, 0.22);
  }

  .phoneme-ipa {
    display: block;
    margin-bottom: 14px;
    font-family: var(--font-mono);
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.05em;
  }

  .phoneme-label {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-sans);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .phoneme-card.is-active .phoneme-label,
  .phoneme-card.is-active .phoneme-note,
  .phoneme-card.is-active .phoneme-ipa {
    color: inherit;
  }

  .phoneme-note {
    margin-top: 10px;
    color: var(--text-soft);
    font-family: var(--font-sans);
    font-size: 12px;
    line-height: 1.5;
  }

  .detail-panel {
    margin-top: 18px;
    border: 1px solid var(--line);
    border-radius: 24px;
    background: var(--panel-strong);
    overflow: hidden;
    animation: panel-rise 220ms ease;
  }

  @keyframes panel-rise {
    from {
      opacity: 0;
      transform: translateY(12px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .detail-hero {
    display: grid;
    grid-template-columns: minmax(180px, 240px) 1fr;
    gap: 22px;
    padding: 24px;
    border-bottom: 1px solid rgba(72, 59, 38, 0.08);
    background:
      linear-gradient(120deg, rgba(180, 79, 44, 0.12), rgba(255, 252, 245, 0));
  }

  .detail-ipa {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 148px;
    border-radius: 24px;
    background: linear-gradient(180deg, rgba(180, 79, 44, 0.92), rgba(135, 53, 27, 0.96));
    color: #fff7ef;
    font-family: var(--font-mono);
    font-size: clamp(34px, 5vw, 56px);
    letter-spacing: -0.08em;
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.16);
  }

  .detail-copy h3,
  .detail-table-wrap h3,
  .detail-note h3,
  .rules-block h3,
  .table-tools h3 {
    margin: 0 0 12px;
    font-family: var(--font-sans);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent-deep);
  }

  .detail-copy p,
  .detail-note p,
  .rules-copy,
  .empty-state p {
    margin: 0;
    color: var(--text-muted);
    font-family: var(--font-sans);
    font-size: 15px;
    line-height: 1.85;
  }

  .detail-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 16px;
  }

  .meta-pill,
  .sort-button {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    border-radius: 999px;
    border: 1px solid var(--line);
    padding: 8px 12px;
    font-family: var(--font-sans);
    font-size: 12px;
    background: rgba(255, 255, 255, 0.82);
    color: var(--text-muted);
  }

  .detail-grid {
    display: grid;
    grid-template-columns: 1.1fr 0.9fr;
    gap: 18px;
    padding: 24px;
  }

  .detail-table-wrap,
  .detail-note,
  .rules-block,
  .table-panel {
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 20px;
    background: rgba(255, 255, 255, 0.82);
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  th {
    text-align: left;
    padding: 0 0 12px;
    border-bottom: 1px solid var(--line);
    font-family: var(--font-sans);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-soft);
  }

  td {
    padding: 14px 0;
    border-bottom: 1px dashed rgba(72, 59, 38, 0.12);
    vertical-align: top;
    font-size: 14px;
  }

  tbody tr:last-child td {
    border-bottom: none;
  }

  .letters-cell,
  .ipa-cell {
    font-family: var(--font-mono);
    color: var(--text);
  }

  .muted-cell {
    color: var(--text-muted);
    font-family: var(--font-sans);
    line-height: 1.7;
  }

  .examples-cell {
    color: var(--accent-deep);
    font-family: var(--font-sans);
    line-height: 1.7;
  }

  .rules-layout {
    display: grid;
    gap: 18px;
  }

  .rules-stack {
    display: grid;
    gap: 14px;
  }

  .rules-block h2 {
    margin: 0 0 14px;
    font-size: 24px;
    line-height: 1.1;
    letter-spacing: -0.03em;
  }

  .rules-list {
    display: grid;
    gap: 10px;
    margin: 0;
    padding: 0;
    list-style: none;
  }

  .rules-list li {
    padding: 14px 16px;
    border-radius: 14px;
    background: var(--bg-soft);
    color: var(--text-muted);
    font-family: var(--font-sans);
    font-size: 14px;
    line-height: 1.75;
  }

  .example-strip {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 14px;
  }

  .example-chip {
    display: inline-flex;
    align-items: center;
    border-radius: 999px;
    background: rgba(53, 95, 141, 0.08);
    color: var(--blue);
    padding: 8px 12px;
    font-family: var(--font-mono);
    font-size: 12px;
  }

  .liaison-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 16px;
  }

  .liaison-column {
    border-radius: 20px;
    padding: 18px;
    border: 1px solid var(--line);
    background: rgba(255, 255, 255, 0.88);
  }

  .liaison-column h4 {
    margin: 0 0 10px;
    font-family: var(--font-sans);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .liaison-column p {
    margin: 0 0 12px;
    color: var(--text-muted);
    font-family: var(--font-sans);
    font-size: 13px;
    line-height: 1.7;
  }

  .liaison-column ul {
    margin: 0;
    padding-left: 18px;
    color: var(--text-muted);
    font-family: var(--font-sans);
    font-size: 14px;
    line-height: 1.75;
  }

  .liaison-column li + li {
    margin-top: 8px;
  }

  .liaison-column.must {
    background: linear-gradient(180deg, var(--green-soft), rgba(255, 255, 255, 0.9));
  }

  .liaison-column.must h4 {
    color: var(--green);
  }

  .liaison-column.forbidden {
    background: linear-gradient(180deg, var(--red-soft), rgba(255, 255, 255, 0.9));
  }

  .liaison-column.forbidden h4 {
    color: var(--red);
  }

  .liaison-column.optional {
    background: linear-gradient(180deg, var(--blue-soft), rgba(255, 255, 255, 0.9));
  }

  .liaison-column.optional h4 {
    color: var(--blue);
  }

  .table-toolbar {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    align-items: center;
    margin-bottom: 18px;
  }

  .sort-group {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .sort-button {
    cursor: pointer;
    transition: border-color 140ms ease, background 140ms ease, color 140ms ease;
  }

  .sort-button.is-active {
    background: var(--text);
    border-color: var(--text);
    color: #f7f2e8;
  }

  .table-scroll {
    overflow-x: auto;
    border: 1px solid var(--line);
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.85);
  }

  .table-scroll table {
    min-width: 820px;
  }

  .table-scroll th,
  .table-scroll td {
    padding-left: 18px;
    padding-right: 18px;
  }

  .source-tag {
    display: inline-flex;
    align-items: center;
    border-radius: 999px;
    padding: 4px 10px;
    background: var(--bg-soft);
    color: var(--text-soft);
    font-family: var(--font-sans);
    font-size: 12px;
  }

  .empty-state {
    padding: 42px 18px;
    text-align: center;
    border: 1px dashed var(--line-strong);
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.62);
  }

  .empty-state strong {
    display: block;
    margin-bottom: 10px;
    font-size: 18px;
  }

  .fade-in {
    animation: fade-in 260ms ease;
  }

  @keyframes fade-in {
    from {
      opacity: 0;
      transform: translateY(10px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @media (max-width: 980px) {
    .topbar-main,
    .detail-hero,
    .detail-grid,
    .liaison-grid {
      grid-template-columns: 1fr;
    }

    .section-head,
    .table-toolbar {
      align-items: flex-start;
      flex-direction: column;
    }
  }

  @media (max-width: 720px) {
    .page-shell {
      width: min(100% - 16px, 1240px);
      margin-top: 8px;
    }

    .topbar {
      top: 8px;
      border-radius: 22px;
    }

    .topbar-main,
    .section-head,
    .section-body,
    .detail-hero,
    .detail-grid {
      padding: 18px;
    }

    .brand-title {
      font-size: 34px;
    }

    .card-grid {
      grid-template-columns: repeat(auto-fill, minmax(132px, 1fr));
      gap: 12px;
    }

    .phoneme-card {
      min-height: 112px;
      padding: 16px 14px 14px;
    }

    .phoneme-ipa {
      font-size: 24px;
    }

    .detail-ipa {
      min-height: 112px;
      border-radius: 20px;
    }
  }
</style>
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <div class="topbar-main">
        <div>
          <span class="brand-kicker">Phonetique Francaise</span>
          <h1 class="brand-title">法语语音知识查询</h1>
          <p class="brand-subtitle">
            顶部切换大类别，主区域浏览音素卡片，点击卡片展开详细发音与拼写规则。搜索框支持按 IPA 音标、字母组合、说明和例词实时过滤。
          </p>
        </div>
        <div class="search-panel">
          <label class="search-box" for="searchInput">
            <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" aria-hidden="true">
              <circle cx="11" cy="11" r="7"></circle>
              <path d="M20 20l-3.5-3.5"></path>
            </svg>
            <input class="search-input" id="searchInput" type="text" placeholder="搜索音标、字母组合、例词，例如 [ɛ] / oi / liaison">
          </label>
          <div class="search-hint">
            <span id="searchStatus">当前未筛选</span>
            <span>纯原生 JS / 移动端友好</span>
          </div>
        </div>
      </div>
      <nav class="tabs" id="tabs"></nav>
    </header>

    <main class="content" id="app"></main>
  </div>

  <script src="./phonetique-data.js"></script>
  <script>
    (function () {
      const loadedData = typeof phonetiqueData !== "undefined" ? phonetiqueData : window.phonetiqueData;

      if (!loadedData) {
        document.getElementById("app").innerHTML =
          '<section class="panel"><div class="section-body"><div class="empty-state"><strong>未找到数据文件</strong><p>请确认 <code>phonetique-data.js</code> 与当前 HTML 位于同一文件夹中，并且文件里定义了 <code>phonetiqueData</code> 变量。</p></div></div></section>';
        return;
      }

      const data = loadedData;
      const state = {
        tab: "vowels",
        query: "",
        tableSort: "letters",
        openByTab: {}
      };

      const tabs = [
        {
          id: "vowels",
          label: "元音",
          kicker: "Voyelles",
          title: "口腔元音卡片",
          description: "每个音素一张卡片，点击后展开口型描述、拼写规则和学习提醒。",
          items: data.vowels,
          categoryLabel: "元音",
          tone: "voyelle orale"
        },
        {
          id: "consonants",
          label: "辅音",
          kicker: "Consonnes",
          title: "辅音卡片",
          description: "聚焦辅音发音部位、阻塞方式与常见字母组合。",
          items: data.consonants,
          categoryLabel: "辅音",
          tone: "consonne"
        },
        {
          id: "semiVowels",
          label: "半元音",
          kicker: "Semi-voyelles",
          title: "半元音卡片",
          description: "查看 [ɥ] / [w] / [j] 的发音方式，以及与元音结合时的拼写规律。",
          items: data.semiVowels,
          categoryLabel: "半元音",
          tone: "semi-voyelle"
        },
        {
          id: "nasalVowels",
          label: "鼻化元音",
          kicker: "Voyelles nasales",
          title: "鼻化元音卡片",
          description: "整理法语四个核心鼻化元音，并结合失鼻化规律快速复习。",
          items: data.nasalVowels,
          categoryLabel: "鼻化元音",
          tone: "voyelle nasale"
        },
        {
          id: "rules",
          label: "语音规则",
          kicker: "Regles",
          title: "语音规则与联诵",
          description: "音节划分、词末发音、重音与节奏组、联诵 / 连音 / 省音、字母 h 和语调集中呈现。"
        },
        {
          id: "table",
          label: "总表",
          kicker: "Table Generale",
          title: "字母音标对照总表",
          description: "整合基础读音表和特殊字母组合，支持按音标或字母排序。"
        }
      ];

      const phonemeTabIds = new Set(["vowels", "consonants", "semiVowels", "nasalVowels"]);
      const app = document.getElementById("app");
      const tabsRoot = document.getElementById("tabs");
      const searchInput = document.getElementById("searchInput");
      const searchStatus = document.getElementById("searchStatus");

      const noteTextByTab = {
        semiVowels: [
          "半元音不能独立构成音节，需要和前后音素组合在同一音节里。",
          "以 [j] 结尾的音节通常视为闭音节，例如 conseil [kɔ̃-sɛj]。",
          "ien / yen / éen 中的 en 往往读 [ɛ̃]，如 magicien、libyen、lycéen。"
        ],
        nasalVowels: [
          "鼻化元音书写上常以 m / n 结尾的字母组合出现。",
          "后接元音字母或 m / n 时常发生失鼻化，如 année、union、aimable。",
          "同一节奏组内也遵循这一规律，例如 bon appétit。"
        ]
      };

      function normalize(value) {
        return String(value || "").toLowerCase();
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function joinExamples(list) {
        return Array.isArray(list) ? list.join(" / ") : "";
      }

      function matchesQuery(textParts, query) {
        if (!query) {
          return true;
        }
        const normalizedQuery = normalize(query);
        return textParts.some(function (part) {
          return normalize(part).includes(normalizedQuery);
        });
      }

      function phonemeMatches(item, query) {
        const spellingText = (item.spellings || []).flatMap(function (entry) {
          return [entry.letters, joinExamples(entry.examples)];
        });
        return matchesQuery([item.symbol, item.description].concat(spellingText), query);
      }

      function getVisiblePhonemes(tabId) {
        const tab = tabs.find(function (entry) {
          return entry.id === tabId;
        });
        if (!tab || !tab.items) {
          return [];
        }
        return tab.items.filter(function (item) {
          return phonemeMatches(item, state.query);
        });
      }

      function getTableRows() {
        const baseRows = (data.pronunciationTable || []).map(function (row) {
          return {
            letters: row.letters,
            sound: row.sound,
            note: row.condition || "",
            examples: joinExamples(row.examples),
            source: "基础总表"
          };
        });

        const extraRows = (data.specialLetterCombinations || []).map(function (row) {
          return {
            letters: row.letters,
            sound: row.sound,
            note: row.condition || "",
            examples: joinExamples(row.examples),
            source: "补充组合"
          };
        });

        return baseRows
          .concat(extraRows)
          .filter(function (row) {
            return matchesQuery([row.letters, row.sound, row.note, row.examples, row.source], state.query);
          })
          .sort(function (a, b) {
            const left = state.tableSort === "sound" ? a.sound : a.letters;
            const right = state.tableSort === "sound" ? b.sound : b.letters;
            return left.localeCompare(right, "fr");
          });
      }

      function getRuleSections() {
        const knowledge = data.phoneticKnowledge || {};
        const sections = [
          knowledge.syllable,
          knowledge.wordEndingPronunciation,
          knowledge.stress,
          knowledge.rhythmGroup,
          knowledge.liaison,
          knowledge.enchaînement,
          knowledge.elision,
          knowledge.letterH,
          knowledge.consonantClusters,
          knowledge.nasalVowelRules,
          knowledge.semiVowelRules
        ].filter(Boolean);

        return sections.filter(function (section) {
          if (!state.query) {
            return true;
          }
          return matchesQuery(
            [section.title, section.description].concat(section.rules || []).concat(section.examples || []),
            state.query
          );
        });
      }

      function getLiaisonBlock() {
        const block = (data.phoneticKnowledge || {}).liaisonRules;
        if (!block) {
          return null;
        }
        if (!state.query) {
          return block;
        }

        const query = state.query;
        function matchColumn(column) {
          if (!column) {
            return null;
          }
          const cases = (column.cases || []).filter(function (item) {
            return matchesQuery([column.title, column.description, item], query);
          });
          if (cases.length || matchesQuery([column.title, column.description], query)) {
            return Object.assign({}, column, {
              cases: cases.length ? cases : column.cases || []
            });
          }
          return null;
        }

        const mandatory = matchColumn(block.mandatory);
        const forbidden = matchColumn(block.forbidden);
        const optional = matchColumn(block.optional);
        const pronunciationRules = ((block.pronunciation && block.pronunciation.rules) || []).filter(function (rule) {
          return matchesQuery([block.pronunciation.title, rule], query);
        });

        if (!mandatory && !forbidden && !optional && !pronunciationRules.length && !matchesQuery([block.title], query)) {
          return null;
        }

        return {
          title: block.title,
          mandatory: mandatory || block.mandatory,
          forbidden: forbidden || block.forbidden,
          optional: optional || block.optional,
          pronunciation: {
            title: block.pronunciation.title,
            rules: pronunciationRules.length ? pronunciationRules : block.pronunciation.rules
          }
        };
      }

      function renderTabs() {
        tabsRoot.innerHTML = tabs.map(function (tab) {
          return '<button class="tab-button' + (state.tab === tab.id ? " is-active" : "") + '" data-tab="' + escapeHtml(tab.id) + '">' + escapeHtml(tab.label) + "</button>";
        }).join("");
      }

      function renderHeaderMeta(count, kind) {
        if (kind === "phoneme") {
          return state.query ? "筛选后 " + count + " 个音素" : "共 " + count + " 个音素";
        }
        if (kind === "table") {
          return state.query ? "筛选后 " + count + " 行" : "共 " + count + " 行";
        }
        return state.query ? "已按搜索词过滤" : "按主题浏览";
      }

      function renderEmpty(label) {
        return (
          '<div class="empty-state">' +
            "<strong>没有匹配结果</strong>" +
            "<p>当前搜索词未命中" + escapeHtml(label) + "相关内容。可以尝试输入 IPA 音标、字母组合或例词。</p>" +
          "</div>"
        );
      }

      function renderPhonemeSection(tab) {
        const visibleItems = getVisiblePhonemes(tab.id);
        const openSymbol = state.openByTab[tab.id];
        const activeItem = visibleItems.find(function (item) {
          return item.symbol === openSymbol;
        }) || visibleItems[0] || null;
        const noteText = noteTextByTab[tab.id] || [];
        const activeSpellings = activeItem ? activeItem.spellings || [] : [];

        return (
          '<section class="panel fade-in">' +
            '<div class="section-head">' +
              "<div>" +
                '<span class="section-kicker">' + escapeHtml(tab.kicker) + "</span>" +
                '<h2 class="section-title">' + escapeHtml(tab.title) + "</h2>" +
                '<p class="section-copy">' + escapeHtml(tab.description) + "</p>" +
              "</div>" +
              '<div class="section-meta">' + escapeHtml(renderHeaderMeta(visibleItems.length, "phoneme")) + "</div>" +
            "</div>" +
            '<div class="section-body">' +
              (
                visibleItems.length
                  ? (
                    '<div class="card-grid">' +
                      visibleItems.map(function (item) {
                        const isActive = activeItem && activeItem.symbol === item.symbol;
                        return (
                          '<button class="phoneme-card' + (isActive ? " is-active" : "") + '" data-symbol="' + escapeHtml(item.symbol) + '">' +
                            '<span class="phoneme-ipa">' + escapeHtml(item.symbol) + "</span>" +
                            '<span class="phoneme-label">' + escapeHtml(tab.tone) + "</span>" +
                            '<div class="phoneme-note">' + escapeHtml((item.spellings || []).length + " 条拼写规则") + "</div>" +
                          "</button>"
                        );
                      }).join("") +
                    "</div>"
                  )
                  : renderEmpty(tab.label)
              ) +
              (
                activeItem
                  ? (
                    '<section class="detail-panel">' +
                      '<div class="detail-hero">' +
                        '<div class="detail-ipa">' + escapeHtml(activeItem.symbol) + "</div>" +
                        '<div class="detail-copy">' +
                          "<h3>发音要领</h3>" +
                          "<p>" + escapeHtml(activeItem.description) + "</p>" +
                          '<div class="detail-meta">' +
                            '<span class="meta-pill">' + escapeHtml(tab.categoryLabel) + "</span>" +
                            '<span class="meta-pill">' + escapeHtml(activeSpellings.length + " 组拼写映射") + "</span>" +
                          "</div>" +
                        "</div>" +
                      "</div>" +
                      '<div class="detail-grid">' +
                        '<div class="detail-table-wrap">' +
                          "<h3>拼写规则表格</h3>" +
                          "<table>" +
                            "<thead><tr><th>字母组合</th><th>说明</th><th>例词</th></tr></thead>" +
                            "<tbody>" +
                              activeSpellings.map(function (entry) {
                                return (
                                  "<tr>" +
                                    '<td class="letters-cell">' + escapeHtml(entry.letters || "") + "</td>" +
                                    '<td class="muted-cell">' + escapeHtml(entry.note || entry.description || "—") + "</td>" +
                                    '<td class="examples-cell">' + escapeHtml(joinExamples(entry.examples) || "—") + "</td>" +
                                  "</tr>"
                                );
                              }).join("") +
                            "</tbody>" +
                          "</table>" +
                        "</div>" +
                        '<aside class="detail-note">' +
                          "<h3>注意事项</h3>" +
                          (
                            noteText.length
                              ? "<p>" + escapeHtml(noteText.join(" ")) + "</p>"
                              : "<p>优先观察音素与字母组合的稳定对应关系，再结合例词巩固口型与发音位置。</p>"
                          ) +
                        "</aside>" +
                      "</div>" +
                    "</section>"
                  )
                  : ""
              ) +
            "</div>" +
          "</section>"
        );
      }

      function renderRuleBlock(section) {
        return (
          '<article class="rules-block">' +
            "<h3>" + escapeHtml(section.title) + "</h3>" +
            (
              section.description
                ? '<p class="rules-copy">' + escapeHtml(section.description) + "</p>"
                : ""
            ) +
            (
              section.rules && section.rules.length
                ? (
                  '<ul class="rules-list">' +
                    section.rules.map(function (rule) {
                      return "<li>" + escapeHtml(rule) + "</li>";
                    }).join("") +
                  "</ul>"
                )
                : ""
            ) +
            (
              section.examples && section.examples.length
                ? (
                  '<div class="example-strip">' +
                    section.examples.map(function (example) {
                      return '<span class="example-chip">' + escapeHtml(example) + "</span>";
                    }).join("") +
                  "</div>"
                )
                : ""
            ) +
          "</article>"
        );
      }

      function renderRulesSection() {
        const ruleSections = getRuleSections();
        const liaisonBlock = getLiaisonBlock();
        const intonation = data.intonation || { types: [] };
        const visibleIntonationTypes = (intonation.types || []).filter(function (type) {
          if (!state.query) {
            return true;
          }
          const cases = (type.cases || []).flatMap(function (entry) {
            return [entry.condition, entry.rule].concat(entry.examples || []);
          });
          return matchesQuery([type.type, type.rule].concat(type.examples || []).concat(cases), state.query);
        });

        return (
          '<section class="panel fade-in">' +
            '<div class="section-head">' +
              "<div>" +
                '<span class="section-kicker">Regles</span>' +
                '<h2 class="section-title">语音规则</h2>' +
                '<p class="section-copy">把零散知识整理成可检索的规则块，尤其突出联诵、连音、字母 h 与语调。</p>' +
              "</div>" +
              '<div class="section-meta">' + escapeHtml(renderHeaderMeta(ruleSections.length + (liaisonBlock ? 1 : 0), "rules")) + "</div>" +
            "</div>" +
            '<div class="section-body">' +
              '<div class="rules-layout">' +
                (
                  liaisonBlock
                    ? (
                      '<article class="rules-block">' +
                        "<h3>" + escapeHtml(liaisonBlock.title) + "</h3>" +
                        '<div class="liaison-grid">' +
                          [
                            { key: "mandatory", className: "must" },
                            { key: "forbidden", className: "forbidden" },
                            { key: "optional", className: "optional" }
                          ].map(function (entry) {
                            const column = liaisonBlock[entry.key];
                            return (
                              '<section class="liaison-column ' + entry.className + '">' +
                                "<h4>" + escapeHtml(column.title) + "</h4>" +
                                '<p>' + escapeHtml(column.description || "") + "</p>" +
                                (
                                  column.cases && column.cases.length
                                    ? "<ul>" + column.cases.map(function (item) {
                                        return "<li>" + escapeHtml(item) + "</li>";
                                      }).join("") + "</ul>"
                                    : '<p>按语境决定是否联诵。</p>'
                                ) +
                              "</section>"
                            );
                          }).join("") +
                        "</div>" +
                        '<div class="detail-note" style="margin-top:16px;">' +
                          "<h3>" + escapeHtml(liaisonBlock.pronunciation.title) + "</h3>" +
                          '<ul class="rules-list">' +
                            liaisonBlock.pronunciation.rules.map(function (rule) {
                              return "<li>" + escapeHtml(rule) + "</li>";
                            }).join("") +
                          "</ul>" +
                        "</div>" +
                      "</article>"
                    )
                    : ""
                ) +
                (
                  ruleSections.length
                    ? '<div class="rules-stack">' + ruleSections.map(renderRuleBlock).join("") + "</div>"
                    : renderEmpty("语音规则")
                ) +
                (
                  visibleIntonationTypes.length
                    ? (
                      '<article class="rules-block">' +
                        "<h3>Intonation</h3>" +
                        "<h2>语调速览</h2>" +
                        '<p class="rules-copy">' + escapeHtml(intonation.description || "") + "</p>" +
                        '<div class="rules-stack" style="margin-top:16px;">' +
                          visibleIntonationTypes.map(function (item) {
                            const caseList = (item.cases || []).map(function (entry) {
                              const exampleText = entry.examples && entry.examples.length ? " " + entry.examples.join(" / ") : "";
                              return "<li>" + escapeHtml((entry.condition || "") + " " + (entry.rule || "") + exampleText) + "</li>";
                            }).join("");

                            return (
                              '<article class="detail-note">' +
                                "<h3>" + escapeHtml(item.type) + "</h3>" +
                                "<p>" + escapeHtml(item.rule || "") + "</p>" +
                                (
                                  item.examples && item.examples.length
                                    ? (
                                      '<div class="example-strip">' +
                                        item.examples.map(function (example) {
                                          return '<span class="example-chip">' + escapeHtml(example) + "</span>";
                                        }).join("") +
                                      "</div>"
                                    )
                                    : ""
                                ) +
                                (
                                  caseList
                                    ? '<ul class="rules-list" style="margin-top:14px;">' + caseList + "</ul>"
                                    : ""
                                ) +
                              "</article>"
                            );
                          }).join("") +
                        "</div>" +
                      "</article>"
                    )
                    : ""
                ) +
              "</div>" +
            "</div>" +
          "</section>"
        );
      }

      function renderTableSection() {
        const rows = getTableRows();

        return (
          '<section class="panel fade-in">' +
            '<div class="section-head">' +
              "<div>" +
                '<span class="section-kicker">Table Generale</span>' +
                '<h2 class="section-title">字母音标对照总表</h2>' +
                '<p class="section-copy">基础读音表与特殊字母组合合并展示，便于快速倒查字母组合与音标。</p>' +
              "</div>" +
              '<div class="section-meta">' + escapeHtml(renderHeaderMeta(rows.length, "table")) + "</div>" +
            "</div>" +
            '<div class="section-body">' +
              '<div class="table-toolbar">' +
                '<div class="table-tools">' +
                  "<h3>排序方式</h3>" +
                  '<div class="sort-group">' +
                    '<button class="sort-button' + (state.tableSort === "letters" ? " is-active" : "") + '" data-sort="letters">按字母排序</button>' +
                    '<button class="sort-button' + (state.tableSort === "sound" ? " is-active" : "") + '" data-sort="sound">按音标排序</button>' +
                  "</div>" +
                "</div>" +
                '<div class="section-meta">搜索框会同步过滤总表行。</div>' +
              "</div>" +
              (
                rows.length
                  ? (
                    '<div class="table-scroll">' +
                      "<table>" +
                        "<thead><tr><th>字母组合</th><th>音标</th><th>说明</th><th>例词</th><th>来源</th></tr></thead>" +
                        "<tbody>" +
                          rows.map(function (row) {
                            return (
                              "<tr>" +
                                '<td class="letters-cell">' + escapeHtml(row.letters) + "</td>" +
                                '<td class="ipa-cell">' + escapeHtml(row.sound) + "</td>" +
                                '<td class="muted-cell">' + escapeHtml(row.note || "—") + "</td>" +
                                '<td class="examples-cell">' + escapeHtml(row.examples || "—") + "</td>" +
                                '<td><span class="source-tag">' + escapeHtml(row.source) + "</span></td>" +
                              "</tr>"
                            );
                          }).join("") +
                        "</tbody>" +
                      "</table>" +
                    "</div>"
                  )
                  : renderEmpty("总表")
              ) +
            "</div>" +
          "</section>"
        );
      }

      function render() {
        renderTabs();

        const currentTab = tabs.find(function (tab) {
          return tab.id === state.tab;
        }) || tabs[0];

        searchStatus.textContent = state.query ? '正在筛选："' + state.query + '"' : "当前未筛选";

        if (phonemeTabIds.has(currentTab.id)) {
          const visibleItems = getVisiblePhonemes(currentTab.id);
          if (!visibleItems.length) {
            state.openByTab[currentTab.id] = "";
          } else if (!state.openByTab[currentTab.id] || !visibleItems.some(function (item) {
            return item.symbol === state.openByTab[currentTab.id];
          })) {
            state.openByTab[currentTab.id] = visibleItems[0].symbol;
          }
          app.innerHTML = renderPhonemeSection(currentTab);
          return;
        }

        if (currentTab.id === "rules") {
          app.innerHTML = renderRulesSection();
          return;
        }

        app.innerHTML = renderTableSection();
      }

      tabsRoot.addEventListener("click", function (event) {
        const button = event.target.closest("[data-tab]");
        if (!button) {
          return;
        }
        state.tab = button.dataset.tab;
        render();
      });

      app.addEventListener("click", function (event) {
        const phonemeButton = event.target.closest("[data-symbol]");
        if (phonemeButton) {
          state.openByTab[state.tab] = phonemeButton.dataset.symbol;
          render();
          return;
        }

        const sortButton = event.target.closest("[data-sort]");
        if (sortButton) {
          state.tableSort = sortButton.dataset.sort;
          render();
        }
      });

      searchInput.addEventListener("input", function (event) {
        state.query = event.target.value.trim();
        render();
      });

      render();
    })();
  </script>
</body>
</html>
